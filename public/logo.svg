<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="50%" stop-color="#d4a028"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="100%" stop-color="#d4a028"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="78"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0a0a0f"/>

  <!-- Subtle glow -->
  <circle cx="100" cy="100" r="90" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Globe lines (clipped to inner circle) -->
  <g clip-path="url(#circleClip)" stroke="url(#goldGrad)" fill="none" stroke-width="0.8" opacity="0.5">
    <!-- Latitude lines -->
    <ellipse cx="100" cy="100" rx="78" ry="20"/>
    <ellipse cx="100" cy="100" rx="78" ry="40"/>
    <ellipse cx="100" cy="100" rx="78" ry="60"/>
    <!-- Longitude lines -->
    <ellipse cx="100" cy="100" rx="20" ry="78"/>
    <ellipse cx="100" cy="100" rx="40" ry="78"/>
    <ellipse cx="100" cy="100" rx="60" ry="78"/>
    <!-- Equator -->
    <line x1="22" y1="100" x2="178" y2="100"/>
    <!-- Meridian -->
    <line x1="100" y1="22" x2="100" y2="178"/>
  </g>

  <!-- Circuit board pattern overlay -->
  <g clip-path="url(#circleClip)" stroke="#d4a028" fill="none" stroke-width="1" opacity="0.35">
    <!-- Horizontal traces -->
    <line x1="30" y1="60" x2="80" y2="60"/>
    <line x1="120" y1="60" x2="170" y2="60"/>
    <line x1="40" y1="80" x2="90" y2="80"/>
    <line x1="110" y1="80" x2="160" y2="80"/>
    <line x1="30" y1="120" x2="90" y2="120"/>
    <line x1="110" y1="120" x2="170" y2="120"/>
    <line x1="40" y1="140" x2="80" y2="140"/>
    <line x1="120" y1="140" x2="160" y2="140"/>
    <!-- Vertical traces -->
    <line x1="60" y1="40" x2="60" y2="70"/>
    <line x1="140" y1="40" x2="140" y2="70"/>
    <line x1="60" y1="130" x2="60" y2="160"/>
    <line x1="140" y1="130" x2="140" y2="160"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#e8a838" opacity="0.6">
    <circle cx="60" cy="60" r="2.5"/>
    <circle cx="140" cy="60" r="2.5"/>
    <circle cx="80" cy="80" r="2"/>
    <circle cx="120" cy="80" r="2"/>
    <circle cx="60" cy="120" r="2.5"/>
    <circle cx="140" cy="120" r="2.5"/>
    <circle cx="80" cy="140" r="2"/>
    <circle cx="120" cy="140" r="2"/>
    <circle cx="100" cy="100" r="3"/>
  </g>

  <!-- Globe highlight arc -->
  <path d="M 60 50 Q 100 30 140 50" stroke="url(#goldLight)" fill="none" stroke-width="1.5" opacity="0.4"/>
</svg>
